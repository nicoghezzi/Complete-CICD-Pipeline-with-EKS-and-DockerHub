apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-maven-app
  labels:
    app: java-maven-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-maven-app
  template:
    metadata:
      labels:
        app: java-maven-app
    spec:
      imagePullSecrets:
        - name: aws-registry-key
      containers:
        - name: java-maven-app
          image: 943066268094.dkr.ecr.us-east-1.amazonaws.com/java-maven-app:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
